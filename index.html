<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタッフ タスク管理表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; color: #1a202c; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #2f5496, #4472c4);
    color: #fff;
    padding: 16px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.1rem; letter-spacing: .03em; }
  header .meta { font-size: .75rem; opacity: .85; text-align: right; }
  header .meta span { display: block; }

  /* ── Main ── */
  main { max-width: 1200px; margin: 0 auto; padding: 16px 12px 80px; }

  /* ── Section title ── */
  .section-title {
    font-size: .72rem;
    font-weight: 700;
    color: #718096;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* ── Summary cards ── */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-top: 4px solid;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { transform: scale(.96); }
  .card.active-filter { box-shadow: 0 0 0 3px #4472c4; }
  .card.total.active-filter  { box-shadow: 0 0 0 3px #2f5496; }
  .card.todo.active-filter   { box-shadow: 0 0 0 3px #e07b39; }
  .card.doing.active-filter  { box-shadow: 0 0 0 3px #d4ac0d; }
  .card.done.active-filter   { box-shadow: 0 0 0 3px #27ae60; }
  .card.total { border-color: #2f5496; }
  .card.todo  { border-color: #e07b39; }
  .card.doing { border-color: #d4ac0d; }
  .card.done  { border-color: #27ae60; }
  .card .num { font-size: 1.7rem; font-weight: 700; margin: 2px 0; line-height: 1; }
  .card.total .num { color: #2f5496; }
  .card.todo  .num { color: #e07b39; }
  .card.doing .num { color: #d4ac0d; }
  .card.done  .num { color: #27ae60; }
  .card .label { font-size: .68rem; color: #718096; font-weight: 600; }

  /* ── Staff workload ── */
  .workload-section { margin-bottom: 16px; }
  .workload-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .wcard {
    background: #fff;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid #4472c4;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .wcard:active { transform: scale(.97); }
  .wcard.active-filter { box-shadow: 0 0 0 3px #4472c4; }
  .wcard-name {
    font-weight: 700;
    font-size: .9rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .wcard-name::before { content: "👤"; font-size: .8rem; }
  .wcard-stats { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .wstat {
    font-size: .7rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 8px;
  }
  .wstat.todo  { background: #fdebd0; color: #a04000; }
  .wstat.doing { background: #fef9e7; color: #7d6608; }
  .wstat.done  { background: #d5f5e3; color: #1d6a3a; }
  .wcard-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .wcard-bar { flex: 1; height: 5px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
  .wcard-bar-inner { height: 100%; border-radius: 3px; transition: width .3s; }
  .wcard-total { font-size: .7rem; color: #718096; white-space: nowrap; }

  /* ── Controls ── */
  .controls {
    background: #fff;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .controls-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .controls-row:last-child { margin-bottom: 0; }
  .controls label { font-size: .78rem; color: #4a5568; font-weight: 700; white-space: nowrap; }
  .controls select, .controls input[type="text"] {
    border: 1px solid #cbd5e0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: .88rem;
    color: #2d3748;
    background: #f7fafc;
    outline: none;
    flex: 1;
    min-width: 0;
    -webkit-appearance: none;
  }
  .controls select:focus, .controls input:focus { border-color: #4472c4; }
  .filter-btns { display: flex; gap: 6px; flex: 1; }
  .filter-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 20px;
    border: 2px solid transparent;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.all    { background: #ebf0fa; color: #2f5496; border-color: #2f5496; }
  .filter-btn.todo   { background: #fdebd0; color: #a04000; border-color: #e07b39; }
  .filter-btn.doing  { background: #fef9e7; color: #7d6608; border-color: #d4ac0d; }
  .filter-btn.done   { background: #d5f5e3; color: #1d6a3a; border-color: #27ae60; }
  .filter-btn.active { opacity: 1; filter: brightness(.92); }
  .filter-btn:not(.active) { opacity: .55; }

  /* ── Task cards (mobile) ── */
  .task-cards { display: flex; flex-direction: column; gap: 10px; }
  .task-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid #cbd5e0;
  }
  .task-card.status-doing { border-left-color: #d4ac0d; }
  .task-card.status-done  { border-left-color: #27ae60; opacity: .75; }
  .task-card.status-todo  { border-left-color: #e07b39; }
  .task-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .task-card-name { font-weight: 700; font-size: 1rem; color: #1a202c; flex: 1; }
  .task-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .task-card-due { font-size: .78rem; color: #718096; }
  .task-card-due.overdue { color: #e53e3e; font-weight: 700; }
  .task-card-staff { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .task-card-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .prog-bar { flex: 1; height: 7px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  .prog-bar-inner { height: 100%; border-radius: 4px; transition: width .3s; }
  .prog-pct { font-size: .78rem; font-weight: 700; color: #4a5568; width: 34px; text-align: right; }
  .task-card-note { font-size: .78rem; color: #718096; background: #f7fafc; border-radius: 6px; padding: 5px 8px; }
  .task-card-category { font-size: .7rem; color: #a0aec0; margin-top: 6px; }

  /* ── Staff tags ── */
  .staff-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: .75rem;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: .75rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge.todo  { background: #fdebd0; color: #a04000; }
  .badge.doing { background: #fef9e7; color: #7d6608; }
  .badge.done  { background: #d5f5e3; color: #1d6a3a; }

  /* ── No results ── */
  .no-results { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: .95rem; display: none; }

  /* ── Desktop table ── */
  .table-wrap { display: none; overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  /* ── Update guide ── */
  .guide {
    margin-top: 20px;
    background: #fff;
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid #4472c4;
  }
  .guide h3 { font-size: .88rem; color: #2f5496; margin-bottom: 8px; }
  .guide p { font-size: .82rem; color: #4a5568; line-height: 1.7; }

  footer { text-align: center; padding: 16px; font-size: .75rem; color: #a0aec0; }

  /* ── Desktop overrides ── */
  @media (min-width: 768px) {
    header { padding: 20px 32px; }
    header h1 { font-size: 1.5rem; }
    main { padding: 24px 16px 48px; }
    .summary { grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .card { padding: 18px 20px; }
    .card .num { font-size: 2.2rem; }
    .card .label { font-size: .8rem; }
    .workload-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .wcard { padding: 16px 18px; }
    .controls { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .controls-row { margin-bottom: 0; }
    .filter-btns .filter-btn { flex: none; padding: 5px 14px; }
    .task-cards { display: none; }
    .table-wrap { display: block; }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: .88rem; }
    thead th {
      background: #2f5496; color: #fff; padding: 12px 14px;
      text-align: center; font-weight: 700; white-space: nowrap;
      position: sticky; top: 60px; z-index: 1;
    }
    thead th:first-child { border-radius: 10px 0 0 0; }
    thead th:last-child  { border-radius: 0 10px 0 0; }
    tbody tr { transition: background .1s; }
    tbody tr:nth-child(even) { background: #f7fafc; }
    tbody tr:hover { background: #ebf0fa; }
    tbody td { padding: 11px 14px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    td.center { text-align: center; }
    td.no { font-weight: 700; color: #2f5496; text-align: center; width: 48px; }
    td.task-name { font-weight: 600; min-width: 160px; }
    .staff-tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .prog-wrap { display: flex; align-items: center; gap: 8px; min-width: 110px; }
    .prog-wrap .prog-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .prog-wrap .prog-pct { font-size: .8rem; font-weight: 700; color: #4a5568; width: 34px; text-align: right; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 タスク管理表</h1>
  <div class="meta">
    <span id="today-date"></span>
    <span>更新: <strong id="last-editor">—</strong></span>
  </div>
</header>

<main>
  <!-- Summary -->
  <div class="section-title" style="margin-top:4px">タスク概要</div>
  <div class="summary">
    <div class="card total" onclick="filterByCard('all')"  title="すべて表示"><div class="label">総タスク</div><div class="num" id="cnt-total">0</div></div>
    <div class="card todo"  onclick="filterByCard('未着手')" title="未着手を表示"><div class="label">未着手</div><div class="num" id="cnt-todo">0</div></div>
    <div class="card doing" onclick="filterByCard('進行中')" title="進行中を表示"><div class="label">進行中</div><div class="num" id="cnt-doing">0</div></div>
    <div class="card done"  onclick="filterByCard('完了')"  title="完了を表示"><div class="label">完了</div><div class="num" id="cnt-done">0</div></div>
  </div>

  <!-- Staff Workload -->
  <div class="workload-section">
    <div class="section-title">スタッフ別タスク状況</div>
    <div class="workload-grid" id="workload-grid"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="controls-row">
      <label>ステータス：</label>
      <div class="filter-btns">
        <button class="filter-btn all active"  onclick="filterStatus('all')">すべて</button>
        <button class="filter-btn todo"        onclick="filterStatus('未着手')">未着手</button>
        <button class="filter-btn doing"       onclick="filterStatus('進行中')">進行中</button>
        <button class="filter-btn done"        onclick="filterStatus('完了')">完了</button>
      </div>
    </div>
    <div class="controls-row">
      <label>担当者：</label>
      <select id="sel-staff" onchange="renderTasks()">
        <option value="">全員</option>
      </select>
    </div>
    <div class="controls-row">
      <label>検索：</label>
      <input type="text" id="search-box" placeholder="タスク名・担当者..." oninput="renderTasks()">
    </div>
  </div>

  <!-- Mobile: Task Cards -->
  <div class="task-cards" id="task-cards"></div>
  <div class="no-results" id="no-results">該当するタスクがありません</div>

  <!-- Desktop: Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>No.</th>
          <th>タスク名</th>
          <th>担当者</th>
          <th>カテゴリ</th>
          <th>ステータス</th>
          <th>開始日</th>
          <th>期限</th>
          <th>進捗</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody id="task-body"></tbody>
    </table>
  </div>

  <!-- Guide -->
  <div class="guide">
    <h3>✏️ 更新方法</h3>
    <p>Claudeに日本語で話しかけるだけで自動更新されます。<br>例：「〇〇さんを△△タスクの担当に追加」「□□のタスクを完了にして」</p>
  </div>
</main>
<footer>スタッフ タスク管理表</footer>

<script>
/* ===== タスクデータ ===== */

const LAST_EDITOR = "";

const STAFF = ["櫻井", "本田", "中野", "田中", "冨山", "神谷", "加藤", "杉岡"];

const TASKS = [
  { no: 1, task: "動画編集①",    staff: ["田中"],        category: "動画",  status: "進行中", start: "2026/03/27", due: "2026/04/05", progress: 75, note: "テロップ入力完了・編集中" },
  { no: 2, task: "動画編集②",    staff: ["加藤", "田中"], category: "動画",  status: "未着手", start: "2026/03/27", due: "", progress: 0, note: "" },
  { no: 3, task: "YouTube企画",   staff: ["田中"],        category: "動画",  status: "進行中", start: "2026/03/27", due: "", progress: 0, note: "" },
  { no: 4, task: "商品発注",      staff: ["田中"],        category: "管理",  status: "未着手", start: "2026/03/27", due: "", progress: 0, note: "在庫確認済み" },
  { no: 5, task: "ストーリー投稿", staff: ["田中"],        category: "SNS",   status: "未着手", start: "2026/03/27", due: "", progress: 0, note: "水・金更新" },
];

/* ====================== */

const TAG_COLORS = [
  { bg: "#dbeafe", color: "#1d4ed8" },
  { bg: "#fce7f3", color: "#9d174d" },
  { bg: "#d1fae5", color: "#065f46" },
  { bg: "#ede9fe", color: "#5b21b6" },
  { bg: "#ffedd5", color: "#9a3412" },
  { bg: "#cffafe", color: "#155e75" },
  { bg: "#fef9c3", color: "#713f12" },
  { bg: "#fee2e2", color: "#991b1b" },
];
const staffColorMap = {};
let colorIndex = 0;
function getStaffColor(name) {
  if (!staffColorMap[name]) {
    staffColorMap[name] = TAG_COLORS[colorIndex % TAG_COLORS.length];
    colorIndex++;
  }
  return staffColorMap[name];
}

let currentStatus = 'all';
const statusClass = { "未着手": "todo", "進行中": "doing", "完了": "done" };
const progressColor = p => p === 100 ? '#27ae60' : p >= 50 ? '#4472c4' : '#e07b39';

function initPage() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });
  document.getElementById('last-editor').textContent = LAST_EDITOR || '—';

  const taskStaff = [...new Set(TASKS.flatMap(t => t.staff))].filter(s => s);
  const allStaff = [...new Set([...STAFF, ...taskStaff])];
  allStaff.forEach(s => getStaffColor(s));

  const sel = document.getElementById('sel-staff');
  allStaff.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });

  renderWorkload(allStaff);
  renderTasks();
}

function renderWorkload(allStaff) {
  const grid = document.getElementById('workload-grid');
  grid.innerHTML = '';
  allStaff.forEach(name => {
    const myTasks = TASKS.filter(t => t.staff.includes(name));
    const total   = myTasks.length;
    const todo    = myTasks.filter(t => t.status === '未着手').length;
    const doing   = myTasks.filter(t => t.status === '進行中').length;
    const done    = myTasks.filter(t => t.status === '完了').length;
    const doneRate = total > 0 ? Math.round((done / total) * 100) : 0;
    const c = getStaffColor(name);
    grid.innerHTML += `
      <div class="wcard" style="border-left-color:${c.color}" onclick="filterByStaff('${name}')">
        <div class="wcard-name" style="color:${c.color}">${name}</div>
        <div class="wcard-stats">
          ${todo  > 0 ? `<span class="wstat todo">未着手 ${todo}</span>` : ''}
          ${doing > 0 ? `<span class="wstat doing">進行中 ${doing}</span>` : ''}
          ${done  > 0 ? `<span class="wstat done">完了 ${done}</span>` : ''}
          ${total === 0 ? '<span style="font-size:.7rem;color:#a0aec0">タスクなし</span>' : ''}
        </div>
        <div class="wcard-bar-wrap">
          <div class="wcard-bar"><div class="wcard-bar-inner" style="width:${doneRate}%;background:${c.color}"></div></div>
          <div class="wcard-total">計 ${total}件</div>
        </div>
      </div>`;
  });
}

function filterByCard(status) {
  const cardMap = { all: 'total', '未着手': 'todo', '進行中': 'doing', '完了': 'done' };
  if (currentStatus === status && status !== 'all') {
    filterStatus('all');
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active-filter'));
  } else {
    filterStatus(status);
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active-filter'));
    document.querySelector(`.card.${cardMap[status]}`).classList.add('active-filter');
    document.querySelector('.controls').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function filterByStaff(name) {
  const sel = document.getElementById('sel-staff');
  if (sel.value === name) {
    sel.value = '';
    document.querySelectorAll('.wcard').forEach(c => c.classList.remove('active-filter'));
  } else {
    sel.value = name;
    document.querySelectorAll('.wcard').forEach(c => c.classList.remove('active-filter'));
    document.querySelectorAll('.wcard').forEach(c => {
      if (c.querySelector('.wcard-name')?.textContent.trim() === name) c.classList.add('active-filter');
    });
  }
  document.querySelector('.controls').scrollIntoView({ behavior: 'smooth', block: 'start' });
  renderTasks();
}

function filterStatus(s) {
  currentStatus = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const map = { all: 'all', '未着手': 'todo', '進行中': 'doing', '完了': 'done' };
  document.querySelector(`.filter-btn.${map[s]}`).classList.add('active');
  renderTasks();
}

function getFiltered() {
  const staffFilter  = document.getElementById('sel-staff').value;
  const searchFilter = document.getElementById('search-box').value.trim().toLowerCase();
  return TASKS.filter(t => {
    if (currentStatus !== 'all' && t.status !== currentStatus) return false;
    if (staffFilter && !t.staff.includes(staffFilter)) return false;
    if (searchFilter) {
      const inTask  = t.task.toLowerCase().includes(searchFilter);
      const inStaff = t.staff.some(s => s.toLowerCase().includes(searchFilter));
      if (!inTask && !inStaff) return false;
    }
    return true;
  }).sort((a, b) => {
    const aDone = a.status === '完了' ? 1 : 0;
    const bDone = b.status === '完了' ? 1 : 0;
    if (aDone !== bDone) return aDone - bDone;
    const aDate = a.due ? new Date(a.due.replace(/\//g, '-')) : null;
    const bDate = b.due ? new Date(b.due.replace(/\//g, '-')) : null;
    if (aDate && bDate) return aDate - bDate;
    if (aDate) return -1;
    if (bDate) return 1;
    return 0;
  });
}

function staffTagsHtml(staffArr) {
  if (!staffArr.length) return '<span style="color:#a0aec0;font-size:.75rem;">未設定</span>';
  return staffArr.map(s => {
    const c = getStaffColor(s);
    return `<span class="staff-tag" style="background:${c.bg};color:${c.color}">${s}</span>`;
  }).join('');
}

function renderTasks() {
  // Summary
  document.getElementById('cnt-total').textContent = TASKS.length;
  document.getElementById('cnt-todo').textContent  = TASKS.filter(t => t.status === '未着手').length;
  document.getElementById('cnt-doing').textContent = TASKS.filter(t => t.status === '進行中').length;
  document.getElementById('cnt-done').textContent  = TASKS.filter(t => t.status === '完了').length;

  const filtered = getFiltered();
  const noRes = document.getElementById('no-results');

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    document.getElementById('task-cards').innerHTML = '';
    document.getElementById('task-body').innerHTML = '';
    return;
  }
  noRes.style.display = 'none';

  // ── Mobile cards ──
  const cards = document.getElementById('task-cards');
  cards.innerHTML = filtered.map((t, i) => {
    const color   = progressColor(t.progress);
    const overdue = t.due && t.status !== '完了' && new Date(t.due.replace(/\//g, '-')) < new Date();
    const dueText = t.due ? (overdue ? `⚠️ ${t.due}` : `📅 ${t.due}`) : '';
    const statusC = statusClass[t.status];
    return `
      <div class="task-card status-${statusC}">
        <div class="task-card-header">
          <div class="task-card-name">${t.task}</div>
          <span class="badge ${statusC}">${t.status}</span>
        </div>
        <div class="task-card-staff">${staffTagsHtml(t.staff)}</div>
        <div class="task-card-progress">
          <div class="prog-bar"><div class="prog-bar-inner" style="width:${t.progress}%;background:${color}"></div></div>
          <div class="prog-pct">${t.progress}%</div>
        </div>
        ${dueText ? `<div class="task-card-meta"><span class="task-card-due${overdue ? ' overdue' : ''}">${dueText}</span></div>` : ''}
        ${t.note ? `<div class="task-card-note">📝 ${t.note}</div>` : ''}
        <div class="task-card-category">${t.category}</div>
      </div>`;
  }).join('');

  // ── Desktop table ──
  const tbody = document.getElementById('task-body');
  tbody.innerHTML = filtered.map((t, i) => {
    const color   = progressColor(t.progress);
    const overdue = t.due && t.status !== '完了' && new Date(t.due.replace(/\//g, '-')) < new Date();
    const dueHtml = overdue ? `<span style="color:#e53e3e;font-weight:700;">⚠ ${t.due}</span>` : (t.due || '—');
    return `
      <tr>
        <td class="no">${i + 1}</td>
        <td class="task-name">${t.task}</td>
        <td class="center"><div class="staff-tags-wrap">${staffTagsHtml(t.staff)}</div></td>
        <td class="center">${t.category}</td>
        <td class="center"><span class="badge ${statusClass[t.status]}">${t.status}</span></td>
        <td class="center">${t.start}</td>
        <td class="center">${dueHtml}</td>
        <td>
          <div class="prog-wrap">
            <div class="prog-bar"><div class="prog-bar-inner" style="width:${t.progress}%;background:${color}"></div></div>
            <div class="prog-pct">${t.progress}%</div>
          </div>
        </td>
        <td>${t.note || '—'}</td>
      </tr>`;
  }).join('');
}

initPage();
</script>
</body>
</html>
